services:
  - type: web
    name: finance-hub-api
    runtime: python
    rootDir: finance_hub
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-hub-db
          property: connectionString
      - key: BOOTSTRAP_DEMO_DATA
        value: false
      - key: BOOTSTRAP_ADMIN
        value: true
      - key: SESSION_SAME_SITE
        value: none
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Finance Hub Admin
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: finance-hub-db
    plan: free
    databaseName: finance_hub
    user: finance_hub
